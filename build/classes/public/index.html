<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java WebSocket Chat</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe8;
            --panel: #fffaf4;
            --ink: #182126;
            --accent: #0f766e;
            --accent-2: #f59e0b;
            --border: #dccfbd;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            background: radial-gradient(circle at top, #fff8ef 0%, var(--bg) 55%, #eadfce 100%);
            color: var(--ink);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .app {
            width: min(760px, 100%);
            background: color-mix(in srgb, var(--panel) 92%, white);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: 0 24px 70px rgba(24, 33, 38, 0.12);
            overflow: hidden;
        }

        .hero {
            padding: 28px;
            background: linear-gradient(135deg, rgba(15, 118, 110, 0.14), rgba(245, 158, 11, 0.2));
            border-bottom: 1px solid var(--border);
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 5vw, 3rem);
        }

        p {
            margin: 0;
            line-height: 1.5;
        }

        .content {
            display: grid;
            gap: 16px;
            padding: 24px;
        }

        .controls,
        .composer {
            display: grid;
            gap: 12px;
            grid-template-columns: 1fr auto;
        }

        input,
        button {
            border-radius: 14px;
            border: 1px solid var(--border);
            font: inherit;
            padding: 14px 16px;
        }

        input {
            background: rgba(255, 255, 255, 0.86);
        }

        button {
            cursor: pointer;
            background: var(--accent);
            color: white;
            font-weight: 700;
            transition: transform 160ms ease, opacity 160ms ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button.secondary {
            background: var(--accent-2);
            color: #2c1800;
        }

        .status {
            padding: 12px 16px;
            border-radius: 14px;
            background: rgba(15, 118, 110, 0.1);
            border: 1px dashed rgba(15, 118, 110, 0.35);
            min-height: 48px;
        }

        .messages {
            min-height: 320px;
            max-height: 420px;
            overflow-y: auto;
            padding: 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid var(--border);
            display: grid;
            gap: 10px;
        }

        .message {
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(15, 118, 110, 0.08);
        }

        .message.server {
            background: rgba(245, 158, 11, 0.16);
        }

        @media (max-width: 640px) {
            .controls,
            .composer {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="hero">
        <h1>Java WebSocket Chat</h1>
        <p>Aplikasi demo real-time sederhana. Buka di beberapa tab browser untuk mencoba broadcast pesan.</p>
    </div>
    <div class="content">
        <div class="controls">
            <input id="nameInput" type="text" maxlength="24" placeholder="Masukkan nama" value="User">
            <button id="connectButton">Connect</button>
        </div>

        <div id="status" class="status">Belum terhubung.</div>

        <div id="messages" class="messages"></div>

        <div class="composer">
            <input id="messageInput" type="text" placeholder="Tulis pesan lalu Enter" disabled>
            <button id="sendButton" class="secondary" disabled>Send</button>
        </div>
    </div>
</div>
<script src="/app.js"></script>
</body>
</html>
